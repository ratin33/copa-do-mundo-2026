<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria</title>

  <style>

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#07111f;
      color:white;
    }

    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
      url('https://images.unsplash.com/photo-1547347298-4074fc3086f0?q=80&w=2070&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    h1{
      font-size:70px;
      margin-bottom:20px;
    }

    p{
      font-size:20px;
      max-width:700px;
    }

    .btn{
      margin-top:30px;
      padding:15px 35px;
      border:none;
      border-radius:40px;
      background:#2563eb;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
      background:#1d4ed8;
    }

  </style>
</head>
<body>
    <!-- GALERIA -->

  <section class="section" id="galeria">

    <div class="title">
      <h2>Galeria</h2>
      <p>Momentos marcantes do futebol mundial.</p>
    </div>

    <div class="gallery">

      <img src="pele.png">
      
      <img src="messi.png">

      <img src="voleio.png">

      <img src="lesao.png">

      <img src="mpabe.png">

    </div>

  </section>


  
    <a class="btn" href="index.html">
      Voltar ao Início
    </a>

  </div>

</body>
</html>
